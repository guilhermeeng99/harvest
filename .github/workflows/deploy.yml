name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── Main app (web) ──
      - run: flutter pub get
      - run: dart run slang
      - run: flutter analyze
      - run: flutter test
      - run: flutter build web --release --no-tree-shake-icons --no-wasm-dry-run --base-href /harvest/

      # ── Harvest site (landing + help center) ──
      - run: flutter pub get
        working-directory: packages/harvest_site
      - run: flutter analyze
        working-directory: packages/harvest_site
      - run: flutter build web --release --no-tree-shake-icons --no-wasm-dry-run --base-href /harvest/site/
        working-directory: packages/harvest_site

      # ── Merge both builds into a single output ──
      - name: Prepare deploy folder
        run: |
          cp -r build/web deploy
          mkdir -p deploy/site
          cp -r packages/harvest_site/build/web/* deploy/site/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
