name: harvest
description: "Fresh food e-commerce app connecting communities with local farmers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^9.2.1

  # Routing
  go_router: ^17.2.0

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0

  # Networking & Data
  dartz: ^0.10.1

  # UI
  google_fonts: ^8.0.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

  # i18n
  slang: ^4.5.0
  slang_flutter: ^4.5.0

  # Utils
  intl: ^0.20.2
  file_picker: ^10.3.10
  image_picker: ^1.1.2
  font_awesome_flutter: ^11.0.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  melos: ^7.5.0
  very_good_analysis: ^10.2.0
  slang_build_runner: ^4.5.0
  build_runner: ^2.4.15
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

melos:
  useRootAsPackage: true
  scripts:
    build:web:
      description: Build Flutter web (main app) for production.
      run: flutter build web --release --no-wasm-dry-run --base-href /harvest/

    build:site:
      description: Build Harvest site (landing + help center) for production.
      run: cd packages/harvest_site && flutter build web --release --no-wasm-dry-run --base-href /harvest/site/

    build:apk:
      description: Build APK release for testing.
      run: flutter build apk --release

    gen:i18n:
      description: Generate i18n files with slang.
      run: dart run slang

    test:
      description: Run all tests.
      run: flutter test

flutter:
  uses-material-design: true

  assets:
    - lib/app/assets/images/
